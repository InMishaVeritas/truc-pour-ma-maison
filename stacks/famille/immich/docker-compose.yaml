---
services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "2283:2283"
    volumes:
      - ${DATA_ROOT}/immich/upload:/data
      # External library (existing photos), read-only:
      - /volume2/photos:/external/photos:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=${TZ}
      - DB_HOSTNAME=postgres
      - DB_USERNAME=${IMMICH_DB_USERNAME}
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_DATABASE_NAME=${IMMICH_DB_DATABASE_NAME}
      - REDIS_HOSTNAME=redis
      # Tells server where uploads go internally:
      - IMMICH_UPLOAD_LOCATION=/data


  immich-machine-learning:
    # OpenVINO image: leverages Intel iGPU on N100 for face/object detection
    # and CLIP embeddings. ~3-5x faster than CPU-only release image.
    image: ghcr.io/immich-app/immich-machine-learning:release-openvino
    container_name: immich-machine-learning
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      # ML models cache (downloaded on first use, ~2 GB):
      - ${DATA_ROOT}/immich/model-cache:/cache
    environment:
      - TZ=${TZ}


  postgres:
    # Immich's official Postgres image with vectorchord extension required
    # for CLIP/face vector search. Do NOT swap for stock postgres.
    image: ghcr.io/immich-app/postgres:14-vectorchord0.3.0
    container_name: immich-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${IMMICH_DB_USERNAME}
      - POSTGRES_PASSWORD=${IMMICH_DB_PASSWORD}
      - POSTGRES_DB=${IMMICH_DB_DATABASE_NAME}
      - POSTGRES_INITDB_ARGS=--data-checksums
    volumes:
      - ${DATA_ROOT}/immich/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready --dbname=${IMMICH_DB_DATABASE_NAME} --username=${IMMICH_DB_USERNAME} || exit 1",
        ]
      interval: 5m
      start_period: 5m

  redis:
    image: docker.io/redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
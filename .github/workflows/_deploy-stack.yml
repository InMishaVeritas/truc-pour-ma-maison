name: Deploy stack (reusable)

on:
  workflow_call:
    inputs:
      stack_name:
        required: true
        type: string
      remote_base_dir:
        required: false
        type: string
        default: /volume2/docker
    secrets:
      ts_oauth_client_id:
        required: true
      ts_oauth_secret:
        required: true
      template_secrets:
        required: false
        description: "JSON object: template variable name -> value"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      STACK_DIR: stacks/${{ inputs.stack_name }}
      REMOTE_DIR: ${{ inputs.remote_base_dir }}/${{ inputs.stack_name }}
      NAS_HOST: ${{ vars.NAS_SSH_USER }}@${{ vars.NAS_TAILSCALE_HOSTNAME }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Render templates
        env:
          TEMPLATE_SECRETS: ${{ secrets.template_secrets }}
        run: |
          set -euo pipefail
          mkdir -p rendered

          # Export each secret as env var, safely
          if [ -n "${TEMPLATE_SECRETS:-}" ]; then
            while IFS= read -r line; do
              export "$line"
            done < <(echo "$TEMPLATE_SECRETS" | jq -r 'to_entries[] | "\(.key)=\(.value)"')
          fi

          # Render every template
          if [ -d "$STACK_DIR/templates" ]; then
            for tmpl in "$STACK_DIR/templates"/*.tmpl; do
              [ -e "$tmpl" ] || continue
              out="rendered/$(basename "${tmpl%.tmpl}")"
              envsubst < "$tmpl" > "$out"
              echo "Rendered: $tmpl"
            done
          fi

          cp "$STACK_DIR/docker-compose.yml" rendered/

      - name: Validate
        run: |
          set -euo pipefail
          for f in rendered/*.yaml rendered/*.yml; do
            [ -e "$f" ] || continue
            yq '.' "$f" > /dev/null
          done
          if grep -rE '\$\{[A-Z_]+\}' rendered/; then
            echo "::error::Unresolved placeholders in rendered files"
            exit 1
          fi

      - name: Tag release
        id: tag
        run: |
          TAG="${{ inputs.stack_name }}-v$(date -u +%Y.%m.%d-%H%M)-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Deploy ${{ inputs.stack_name }} from ${GITHUB_SHA::7}"
          git push origin "$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.ts_oauth_client_id }}
          oauth-secret: ${{ secrets.ts_oauth_secret }}
          tags: tag:ci
          version: latest
          use-cache: 'true'

      - name: Deploy
        run: |
          set -euo pipefail
          
          # Ensure remote dir exists
          ssh -o StrictHostKeyChecking=accept-new "$NAS_HOST" \
            "mkdir -p $REMOTE_DIR"

          # Upload compose
          scp rendered/docker-compose.yml "$NAS_HOST:$REMOTE_DIR/"

          # Upload rendered configs to conf/
          shopt -s nullglob
          configs=(rendered/*.yaml rendered/*.yml)
          for f in "${configs[@]}"; do
            [ "$(basename "$f")" = "docker-compose.yml" ] && continue
            scp "$f" "$NAS_HOST:$REMOTE_DIR/conf/"
          done

          # Apply
          ssh "$NAS_HOST" "cd $REMOTE_DIR && docker compose pull && docker compose up -d --remove-orphans"

      - name: Summary
        run: |
          {
            echo "## ✅ Deployed ${{ inputs.stack_name }}"
            echo ""
            echo "- **Tag**: \`${{ steps.tag.outputs.tag }}\`"
            echo "- **Commit**: \`${GITHUB_SHA::7}\`"
            echo "- **NAS path**: \`${REMOTE_DIR}\`"
          } >> $GITHUB_STEP_SUMMARY
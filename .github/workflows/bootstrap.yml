name: bootstrap.yml
on:
  workflow_dispatch:
    secrets:
      ts_oauth_client_id:
        required: true
      ts_oauth_secret:
        required: true
      nas_ssh_private_key:
        required: true

jobs:
  infra:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      NAS_HOST: ${{ vars.NAS_SSH_USER }}@${{ vars.NAS_TAILSCALE_HOSTNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.ts_oauth_client_id }}
          oauth-secret: ${{ secrets.ts_oauth_secret }}
          tags: tag:ci
          version: latest
          use-cache: 'true'

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.nas_ssh_private_key }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "StrictHostKeyChecking=accept-new" >> ~/.ssh/config


      - name: k3s setup
        uses: dawidd6/action-ansible-playbook@v2
        with:
          playbook: ansible/bootstrap.yml
          inventory: ansible/inventory.ini
          key: ${{ secrets.nas_ssh_private_key }}


      - name: Fetch kubeconfig
        id: kubeconfig
        run: |
          mkdir -p ~/.kube
          ssh -o StrictHostKeyChecking=no ${{ env.NAS_HOST }} \
            "sudo cat /etc/rancher/k3s/k3s.yaml" > ~/.kube/config
          sed -i 's/127.0.0.1/nas-maison/' ~/.kube/config

      - name: Test cluster
        run: kubectl get namespace